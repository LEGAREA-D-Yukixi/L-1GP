<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>L-1グランプリ | Division対抗ポイントバトル</title>
<style>
  :root {
    --navy0:#03060f; --navy1:#071231; --navy2:#0c1c46; --panel:#0a1838; --panel2:#0f2452;
    --line:#1f5ec0; --line-soft:#173a7e;
    --cyan:#35c8ff; --cyan-soft:#8fe6ff; --gold:#ffc627; --gold-soft:#ffe27a;
    --text:#eaf2ff; --muted:#9fb4dd;
    --add:#3ce38c; --deduct:#ff556e; --danger:#ffe000;
    --g-gold:linear-gradient(150deg,#fff6d6 0%,#ffd75e 34%,#e6a913 68%,#9c6f0c 100%);
    --g-silver:linear-gradient(150deg,#ffffff 0%,#dbe3ee 32%,#9fadc2 66%,#69748a 100%);
    --g-bronze:linear-gradient(150deg,#ffe0c2 0%,#e6a877 32%,#b9743e 66%,#7c4a24 100%);
  }
  * { box-sizing:border-box; }
  html,body { margin:0; }
  body {
    font-family:"Hiragino Kaku Gothic ProN","Noto Sans JP",Meiryo,sans-serif; color:var(--text);
    background:var(--navy0); min-height:100vh;
  }
  /* ===== ポスター調 背景（濃紺＋回路＋グロー・全面適用） ===== */
  body::before {
    content:""; position:fixed; inset:0; z-index:0; pointer-events:none;
    background:
      radial-gradient(1200px 560px at 50% -80px, rgba(60,205,255,.34), transparent 60%),
      radial-gradient(820px 600px at 8% 14%, rgba(38,110,215,.40), transparent 56%),
      radial-gradient(820px 600px at 92% 24%, rgba(28,84,180,.38), transparent 56%),
      radial-gradient(760px 640px at 50% 110%, rgba(24,74,165,.40), transparent 58%),
      linear-gradient(180deg, #0c1c46 0%, #0a1738 40%, #06102a 74%, #03060f 100%);
  }
  body::after {
    content:""; position:fixed; inset:0; z-index:0; pointer-events:none; opacity:.7;
    background-image:
      /* 回路グリッド */
      linear-gradient(rgba(70,190,255,.10) 1px, transparent 1px),
      linear-gradient(90deg, rgba(70,190,255,.10) 1px, transparent 1px),
      /* 斜めの回路トレース */
      repeating-linear-gradient(45deg, rgba(70,190,255,.05) 0 2px, transparent 2px 26px),
      /* 光るノード */
      radial-gradient(circle, rgba(130,220,255,.7) 1.6px, transparent 2px);
    background-size:52px 52px, 52px 52px, 200px 200px, 156px 156px;
    background-position:0 0, 0 0, 0 0, 26px 36px;
    mask-image:radial-gradient(150% 130% at 50% 42%, #000 60%, rgba(0,0,0,.35) 100%);
    -webkit-mask-image:radial-gradient(150% 130% at 50% 42%, #000 60%, rgba(0,0,0,.35) 100%);
  }
  /* スパークル（星）レイヤー */
  .bgfx { position:fixed; inset:0; z-index:0; pointer-events:none; opacity:.9; }
  .bgfx b {
    position:absolute; width:2px; height:2px; border-radius:50%; background:#dff3ff;
    box-shadow:0 0 6px 2px rgba(150,225,255,.9), 0 0 12px 4px rgba(90,180,255,.4);
    animation:tw 3.4s ease-in-out infinite;
  }
  .bgfx b:nth-child(1){left:12%;top:10%} .bgfx b:nth-child(2){left:83%;top:8%;width:3px;height:3px;animation-delay:.6s}
  .bgfx b:nth-child(3){left:47%;top:5%;animation-delay:1.1s} .bgfx b:nth-child(4){left:24%;top:22%;animation-delay:.3s}
  .bgfx b:nth-child(5){left:68%;top:18%;animation-delay:1.6s} .bgfx b:nth-child(6){left:91%;top:33%;animation-delay:.9s}
  .bgfx b:nth-child(7){left:6%;top:38%;animation-delay:2s} .bgfx b:nth-child(8){left:55%;top:30%;width:3px;height:3px;animation-delay:1.4s}
  .wrap { max-width:940px; margin:0 auto; padding:14px 16px 90px; position:relative; z-index:1; }

  /* ===== ヘッダー ===== */
  header { text-align:center; padding:10px 0 4px; }
  .kicker { color:var(--cyan-soft); letter-spacing:.14em; font-weight:800; font-size:14px; text-shadow:0 0 10px rgba(53,200,255,.5); }
  .logorow { display:flex; align-items:center; justify-content:center; gap:6px; margin:2px 0; }
  .logo {
    font-size:clamp(36px,9.5vw,62px); font-weight:900; line-height:1; font-style:italic; letter-spacing:.01em;
    background:linear-gradient(180deg,#fff 6%,var(--gold-soft) 42%,var(--gold) 76%);
    -webkit-background-clip:text; background-clip:text; color:transparent;
    filter:drop-shadow(0 3px 10px rgba(255,198,39,.5)) drop-shadow(0 0 2px rgba(0,0,0,.7));
  }
  .logo-trophy { height:clamp(52px,13vw,86px); filter:drop-shadow(0 4px 14px rgba(255,198,39,.55)); margin:0 -2px; }
  .tagline {
    display:inline-block; margin-top:6px; padding:6px 20px; font-weight:800; font-size:14px; color:#06122e;
    background:linear-gradient(90deg,var(--cyan),var(--cyan-soft)); border-radius:4px;
    clip-path:polygon(7px 0,100% 0,calc(100% - 7px) 100%,0 100%); box-shadow:0 0 16px rgba(53,200,255,.4);
  }

  /* ===== 見出し（▶▶ … ◀◀） ===== */
  .banner { display:flex; align-items:center; justify-content:center; gap:12px; margin:24px 0 12px;
            font-weight:900; font-size:clamp(17px,4.4vw,22px); text-shadow:0 0 12px rgba(53,200,255,.55); }
  .banner .tri { color:var(--cyan); letter-spacing:-2px; font-size:15px; }

  .tabs { display:flex; gap:8px; margin:4px 0; flex-wrap:wrap; justify-content:center; }
  .tabs button { background:rgba(10,24,56,.75); color:var(--cyan-soft); border:1px solid var(--line-soft);
                 border-radius:8px; padding:9px 15px; cursor:pointer; font-size:14px; font-weight:700; transition:.15s; }
  .tabs button:hover { border-color:var(--cyan); }
  .tabs button.active { background:linear-gradient(90deg,var(--cyan),#1b8fd6); color:#06122e; border-color:var(--cyan); box-shadow:0 0 16px rgba(53,200,255,.4); }

  .card { background:linear-gradient(180deg,rgba(12,28,66,.94),rgba(8,20,48,.94)); border:1px solid var(--line);
          border-radius:14px; padding:16px; margin-bottom:16px; box-shadow:inset 0 0 0 1px rgba(53,200,255,.06),0 8px 30px rgba(0,0,0,.4); }
  .card h2 { font-size:15px; margin:0 0 12px; color:var(--cyan-soft); }

  select,input,textarea { width:100%; background:#061031; color:var(--text); border:1px solid var(--line-soft);
                          border-radius:8px; padding:10px 11px; font-size:14px; }
  select:focus,input:focus,textarea:focus { outline:none; border-color:var(--cyan); box-shadow:0 0 0 3px rgba(53,200,255,.18); }
  label { display:block; font-size:12px; color:var(--muted); margin:10px 0 4px; }
  .btn { background:linear-gradient(90deg,var(--gold),var(--gold-soft)); color:#2a1c00; border:none; border-radius:8px;
         padding:11px 20px; font-size:14px; font-weight:800; cursor:pointer; box-shadow:0 4px 16px rgba(255,198,39,.3); margin-top:14px; }
  .btn:disabled { opacity:.5; cursor:default; }

  /* ===== 順位（案3: 3D深度 逆ピラミッド） ===== */
  @keyframes tw{0%,100%{opacity:.35;transform:scale(.8)}50%{opacity:1;transform:scale(1.25)}}
  @keyframes champGlow{0%,100%{box-shadow:0 0 24px rgba(255,198,39,.4),inset 0 2px 0 rgba(255,225,150,.35),inset 0 -6px 14px rgba(0,0,0,.4)}50%{box-shadow:0 0 44px rgba(255,198,39,.72),inset 0 2px 0 rgba(255,225,150,.5),inset 0 -6px 14px rgba(0,0,0,.4)}}
  @keyframes floaty{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
  #podium { display:flex; flex-direction:column; align-items:center; gap:11px; }
  .medallion { width:46px; height:46px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:900; font-size:17px; color:#2a1c00;
    box-shadow:0 3px 8px rgba(0,0,0,.5),inset 0 2px 4px rgba(255,255,255,.6),inset 0 -3px 6px rgba(0,0,0,.35); border:2px solid rgba(255,255,255,.35); flex:0 0 auto; }
  .m-gold{background:var(--g-gold)} .m-silver{background:var(--g-silver)} .m-bronze{background:var(--g-bronze)}
  .m-blue{background:linear-gradient(150deg,#8fd0ff,#2f7fd0,#173a7e);color:#eaf6ff;text-shadow:0 1px 2px rgba(0,0,0,.5)}
  .m-danger{background:linear-gradient(150deg,#fff2a8,#ffd400,#b39400);color:#3a2b00}
  .prow { position:relative; margin:0 auto; width:100%; display:grid; grid-template-columns:58px 1fr auto; align-items:center; gap:14px;
    border-radius:16px; padding:14px 16px; color:var(--text); transition:width .25s ease;
    background:linear-gradient(180deg,rgba(30,58,124,.96),rgba(10,24,60,.98)); border:1px solid rgba(90,160,255,.35);
    box-shadow:0 10px 24px rgba(0,0,0,.42),inset 0 2px 0 rgba(150,205,255,.35),inset 0 -6px 14px rgba(0,0,0,.4); }
  .prow .nm { font-weight:800; font-size:16px; display:flex; align-items:center; flex-wrap:wrap; }
  .prow .sub { font-size:11px; color:var(--muted); display:block; width:100%; margin-top:2px; }
  .prow .val { text-align:right; white-space:nowrap; }
  .prow .val .pt { font-weight:900; font-size:20px; }

  /* ミニ基準線ゲージ: 左端0・中央1,000 */
  .mini { position:relative; height:14px; background:rgba(2,8,24,.85); border-radius:7px; overflow:hidden; border:1px solid var(--line-soft); margin-top:8px; width:100%; }
  .mini .f { position:absolute; left:0; top:0; bottom:0; border-radius:7px 0 0 7px; }
  .mini .f.up { background:linear-gradient(90deg,rgba(56,224,138,.5),var(--add)); }
  .mini .f.down { background:linear-gradient(90deg,rgba(255,85,110,.5),var(--deduct)); }
  .mini .f.champ { background:var(--g-gold); }
  .mini .c { position:absolute; left:50%; top:-2px; bottom:-2px; width:2px; background:rgba(255,255,255,.65); }
  .mini .z { position:absolute; left:4px; top:0; font-size:8px; color:rgba(255,255,255,.5); line-height:14px; }
  .mini .k { position:absolute; left:50%; transform:translateX(-50%); top:0; font-size:8px; color:rgba(255,255,255,.85); line-height:14px; font-weight:800; }

  /* 1位 = 王者（金オーラ＋トロフィー） */
  .prow.champ { background:linear-gradient(180deg,rgba(92,66,14,.7),rgba(30,24,8,.92)); border:2px solid var(--gold); animation:champGlow 2.8s ease-in-out infinite; }
  .prow.champ .nm { font-size:20px; color:var(--gold-soft); text-shadow:0 0 14px rgba(255,198,39,.5); }
  .prow.champ .val .pt { font-size:24px; color:var(--gold-soft); }
  .prow .c-tro { position:absolute; right:14px; top:-20px; height:56px; filter:drop-shadow(0 6px 14px rgba(255,198,39,.6)); animation:floaty 4s ease-in-out infinite; }
  .champ-tag { display:inline-block; font-size:10px; font-weight:900; color:#2a1c00; background:var(--g-gold); padding:2px 9px; border-radius:11px; margin-left:7px; }

  /* 最下位 = 危険（ハザードテープ） */
  .prow.last { border:2px solid var(--danger); background:linear-gradient(180deg,rgba(80,14,26,.85),rgba(40,8,16,.95)); }
  .prow.last .nm { color:#ffc0cc; }
  .prow.last::after { content:""; position:absolute; left:0; right:0; bottom:0; height:6px; border-radius:0 0 14px 14px;
    background:repeating-linear-gradient(45deg,#ffe000 0 12px,#1a1a1a 12px 24px); }
  .last-tag { display:inline-block; font-size:10px; font-weight:900; color:#2a0008; background:var(--danger); padding:2px 9px; border-radius:11px; margin-left:7px; }
  .last-note { text-align:center; color:var(--danger); font-size:12px; font-weight:700; margin-top:6px; }
  .gappos{color:var(--add)} .gapneg{color:var(--deduct)}

  /* ===== 判定基準（ポスター準拠テーブル） ===== */
  .critwrap { display:grid; gap:16px; }
  .crittbl { border-radius:12px; overflow:hidden; border:1px solid var(--line-soft); }
  .crittbl.deduct { border-color:rgba(53,200,255,.5); }
  .crittbl.add { border-color:rgba(255,110,180,.5); }
  .crithead { display:flex; align-items:center; gap:10px; padding:10px 14px; font-weight:900; font-size:15px; }
  .crittbl.deduct .crithead { background:linear-gradient(90deg,rgba(53,200,255,.28),transparent); color:var(--cyan-soft); }
  .crittbl.add .crithead { background:linear-gradient(90deg,rgba(255,110,180,.28),transparent); color:#ff9ecb; }
  .critrow { display:grid; grid-template-columns:44px 1fr auto; align-items:center; gap:10px; padding:9px 12px; border-top:1px solid rgba(53,200,255,.12); font-size:13px; }
  .critrow .ci { width:30px; height:30px; object-fit:contain; border-radius:6px; }
  .critrow .clabel { font-weight:700; }
  .critrow .cdesc { color:var(--muted); font-size:11px; margin-top:1px; }
  .critrow .cpt { font-weight:900; white-space:nowrap; }
  .critrow .cpt.add { color:var(--add); }
  .critrow .cpt.deduct { color:var(--deduct); }

  /* ===== フィード ===== */
  .feeditem { display:flex; justify-content:space-between; gap:10px; padding:10px 4px; border-bottom:1px solid var(--line-soft); font-size:13px; align-items:center; }
  .feeditem:last-child { border-bottom:none; }
  .feeditem .left { min-width:0; display:flex; align-items:center; gap:8px; }
  .feeditem .fi { width:22px; height:22px; object-fit:contain; flex:0 0 auto; border-radius:5px; }
  .feeditem .date { color:var(--muted); margin-right:6px; font-variant-numeric:tabular-nums; }
  .add { color:var(--add); font-weight:800; }
  .deduct { color:var(--deduct); font-weight:800; }
  .muted { color:var(--muted); font-size:12px; }

  .blackout { text-align:center; padding:30px 12px; }
  .blackout .big { font-size:21px; font-weight:900; margin-bottom:8px; color:var(--gold-soft); text-shadow:0 0 16px rgba(255,198,39,.4); }
  .blackout p { color:var(--muted); font-size:14px; margin:4px 0; }

  .msg { border-radius:8px; padding:11px 13px; font-size:13px; margin-top:12px; display:none; }
  .msg.okmsg { background:rgba(56,224,138,.12); color:var(--add); display:block; border:1px solid rgba(56,224,138,.3); }
  .msg.ngmsg { background:rgba(255,85,110,.12); color:var(--deduct); display:block; white-space:pre-wrap; border:1px solid rgba(255,85,110,.3); }
  .hidden { display:none !important; }
  #loading { color:var(--muted); padding:26px; text-align:center; }

  footer.sky { position:fixed; left:0; right:0; bottom:0; height:150px; z-index:0; pointer-events:none;
    background:
      radial-gradient(600px 160px at 50% 120%, rgba(53,200,255,.22), transparent 70%),
      url("data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A//www.w3.org/2000/svg%22%20width%3D%221440%22%20height%3D%22170%22%20viewBox%3D%220%200%201440%20170%22%3E%3Cg%20fill%3D%22%230a1b3d%22%3E%3Crect%20x%3D%220%22%20y%3D%22111%22%20width%3D46%20height%3D59%20rx%3D2/%3E%3Crect%20x%3D%2251%22%20y%3D%22121%22%20width%3D29%20height%3D49%20rx%3D2/%3E%3Crect%20x%3D%2286%22%20y%3D%2284%22%20width%3D32%20height%3D86%20rx%3D2/%3E%3Crect%20x%3D%22124%22%20y%3D%2266%22%20width%3D29%20height%3D104%20rx%3D2/%3E%3Crect%20x%3D%22156%22%20y%3D%22119%22%20width%3D28%20height%3D51%20rx%3D2/%3E%3Crect%20x%3D%22189%22%20y%3D%22122%22%20width%3D52%20height%3D48%20rx%3D2/%3E%3Crect%20x%3D%22244%22%20y%3D%2260%22%20width%3D31%20height%3D110%20rx%3D2/%3E%3Crect%20x%3D%22280%22%20y%3D%2225%22%20width%3D29%20height%3D145%20rx%3D2/%3E%3Crect%20x%3D%22315%22%20y%3D%22102%22%20width%3D33%20height%3D68%20rx%3D2/%3E%3Crect%20x%3D%22355%22%20y%3D%2257%22%20width%3D29%20height%3D113%20rx%3D2/%3E%3Crect%20x%3D%22390%22%20y%3D%22124%22%20width%3D51%20height%3D46%20rx%3D2/%3E%3Crect%20x%3D%22444%22%20y%3D%2259%22%20width%3D28%20height%3D111%20rx%3D2/%3E%3Crect%20x%3D%22475%22%20y%3D%2277%22%20width%3D44%20height%3D93%20rx%3D2/%3E%3Crect%20x%3D%22522%22%20y%3D%22115%22%20width%3D60%20height%3D55%20rx%3D2/%3E%3Crect%20x%3D%22588%22%20y%3D%2259%22%20width%3D45%20height%3D111%20rx%3D2/%3E%3Crect%20x%3D%22640%22%20y%3D%22117%22%20width%3D37%20height%3D53%20rx%3D2/%3E%3Crect%20x%3D%22683%22%20y%3D%2283%22%20width%3D38%20height%3D87%20rx%3D2/%3E%3Crect%20x%3D%22723%22%20y%3D%2258%22%20width%3D30%20height%3D112%20rx%3D2/%3E%3Crect%20x%3D%22755%22%20y%3D%2267%22%20width%3D39%20height%3D103%20rx%3D2/%3E%3Crect%20x%3D%22801%22%20y%3D%2276%22%20width%3D60%20height%3D94%20rx%3D2/%3E%3Crect%20x%3D%22865%22%20y%3D%2256%22%20width%3D55%20height%3D114%20rx%3D2/%3E%3Crect%20x%3D%22925%22%20y%3D%2292%22%20width%3D49%20height%3D78%20rx%3D2/%3E%3Crect%20x%3D%22977%22%20y%3D%2241%22%20width%3D37%20height%3D129%20rx%3D2/%3E%3Crect%20x%3D%221017%22%20y%3D%2257%22%20width%3D31%20height%3D113%20rx%3D2/%3E%3Crect%20x%3D%221052%22%20y%3D%2267%22%20width%3D59%20height%3D103%20rx%3D2/%3E%3Crect%20x%3D%221115%22%20y%3D%2294%22%20width%3D54%20height%3D76%20rx%3D2/%3E%3Crect%20x%3D%221175%22%20y%3D%22115%22%20width%3D30%20height%3D55%20rx%3D2/%3E%3Crect%20x%3D%221211%22%20y%3D%22109%22%20width%3D52%20height%3D61%20rx%3D2/%3E%3Crect%20x%3D%221267%22%20y%3D%2268%22%20width%3D35%20height%3D102%20rx%3D2/%3E%3Crect%20x%3D%221307%22%20y%3D%2245%22%20width%3D28%20height%3D125%20rx%3D2/%3E%3Crect%20x%3D%221337%22%20y%3D%2287%22%20width%3D46%20height%3D83%20rx%3D2/%3E%3Crect%20x%3D%221390%22%20y%3D%2254%22%20width%3D48%20height%3D116%20rx%3D2/%3E%3C/g%3E%3C/svg%3E") repeat-x bottom center / auto 150px;
    opacity:.9;
    mask-image:linear-gradient(180deg, transparent, #000 45%);
    -webkit-mask-image:linear-gradient(180deg, transparent, #000 45%); }
  .foot-note { text-align:center; color:var(--muted); font-size:11px; margin-top:18px; }
</style>
</head>
<body>
<div class="bgfx"><b></b><b></b><b></b><b></b><b></b><b></b><b></b><b></b></div>
<div class="wrap">
  <header>
    <div class="kicker">Division 対抗ポイントバトル！</div>
    <div class="logorow">
      <span class="logo">L-1</span>
      <img id="trophyImg" class="logo-trophy" alt="トロフィー">
      <span class="logo">グランプリ</span>
    </div>
    <div class="tagline">全員の力で優勝を勝ち取れ！</div>
  </header>

  <div class="tabs">
    <button id="tabSeason" class="active">順位</button>
    <button id="tabAnnual">年間集計</button>
    <button id="tabCriteria">判定基準</button>
    <button id="tabApply">ポイント申請</button>
  </div>

  <div id="loading">読み込み中…</div>
  <div id="errBox" class="msg"></div>

  <!-- 順位 -->
  <section id="secSeason" class="hidden">
    <div class="card">
      <label for="seasonSel">シーズン</label>
      <select id="seasonSel"></select>
    </div>
    <div class="banner"><span class="tri">▶▶▶</span><span id="standingsTitle">現在の順位</span><span class="tri">◀◀◀</span></div>
    <div id="standingsBody"></div>
    <div class="banner"><span class="tri">▶▶</span>ポイント増減フィード<span class="tri">◀◀</span></div>
    <div class="card">
      <div class="muted" id="feedNote">直近の加点・減点の記録です（基準は 1,000L）。</div>
      <div id="feedBody"></div>
    </div>
  </section>

  <!-- 年間集計 -->
  <section id="secAnnual" class="hidden">
    <div class="banner"><span class="tri">▶▶▶</span><span id="annualTitle">年間集計</span><span class="tri">◀◀◀</span></div>
    <div id="annualBody"></div>
  </section>

  <!-- 判定基準 -->
  <section id="secCriteria" class="hidden">
    <div class="banner"><span class="tri">▶▶▶</span>ポイント判定基準<span class="tri">◀◀◀</span></div>
    <div class="critwrap" id="criteriaBody"></div>
  </section>

  <!-- 申請 -->
  <section id="secApply" class="hidden">
    <div class="banner"><span class="tri">▶▶</span>ポイント申請<span class="tri">◀◀</span></div>

    <!-- 未ログイン: ログインフォーム -->
    <div id="applyLogin" class="card hidden">
      <div class="muted">ポイント申請には申請権限のあるアカウントでのログインが必要です。</div>
      <label for="lgEmail">メールアドレス</label>
      <input id="lgEmail" type="email" autocomplete="username" placeholder="you@legarea.jp">
      <label for="lgPass">パスワード</label>
      <input id="lgPass" type="password" autocomplete="current-password" placeholder="パスワード">
      <button class="btn" id="lgBtn">ログイン</button>
      <div id="lgMsg" class="msg"></div>
    </div>

    <!-- ログイン済みだが権限なし -->
    <div id="applyDenied" class="card hidden">
      <div class="blackout">
        <div class="big">🔒 申請権限がありません</div>
        <p><span id="deniedEmail"></span> には申請権限が付与されていません。</p>
        <p>運営（管理者）に申請者への追加を依頼してください。</p>
      </div>
      <button class="btn" id="denyLogout" style="background:linear-gradient(90deg,#4a5a7e,#6c7a99)">別のアカウントでログイン</button>
    </div>

    <!-- 権限あり: 申請フォーム -->
    <div id="applyForm" class="card hidden">
      <div class="muted" style="display:flex;justify-content:space-between;align-items:center;gap:10px">
        <span>申請内容は運営の承認後にダッシュボードへ反映されます。</span>
        <span style="white-space:nowrap"><span id="whoami"></span> <a href="#" id="logoutLink" style="color:var(--cyan-soft)">ログアウト</a></span>
      </div>
      <label for="apDivision">Division</label>
      <select id="apDivision"></select>
      <label for="apRule">項目</label>
      <select id="apRule"></select>
      <div id="apPreview" class="hidden" style="margin-top:10px"></div>
      <div id="apPointsWrap" class="hidden">
        <label for="apPoints">ポイント（不定期missionのみ入力・加点は正の整数）</label>
        <input id="apPoints" type="number" step="1" placeholder="例: 300">
      </div>
      <label for="apDate">発生日</label>
      <input id="apDate" type="date">
      <label for="apName">申請者名</label>
      <input id="apName" type="text" maxlength="100" placeholder="氏名">
      <label for="apNote">詳細・理由（運営のみ閲覧）</label>
      <textarea id="apNote" rows="3" maxlength="2000" placeholder="内容の補足があれば記入"></textarea>
      <button class="btn" id="apSubmit">申請する</button>
      <div id="apMsg" class="msg"></div>
    </div>
  </section>

  <div class="foot-note"></div>
</div>
<footer class="sky"></footer>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
import { SUPABASE_URL, SUPABASE_ANON_KEY } from './config.js';
import {
  isBlackout, isAnnualBlackout, seasonForDate, calcStandingsCarry, calcAnnualStandings,
  validateRequestInput, groupRules, buildFeed, formatPoints, seasonBaseline, pointsBar, pyramidWidth, annualTermLabel, rankGaps, leadOverSecond,
} from './l1-core.js';
import { ICON_DATA, TROPHY } from './l1-icons.js';

const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const $ = id => document.getElementById(id);
const todayISO = () => new Date().toLocaleDateString('sv-SE');
const EVENT_COLS = 'id, season_id, division_id, rule_id, points, occurred_on, request_id, created_at, voided_at';

// 判定基準カテゴリ → ポスター切り出しアイコン（base64埋め込み・ルール厳守/遵守を吸収）
const iconFor = cat => ICON_DATA[cat] || (cat === 'ルール厳守' ? ICON_DATA['ルール遵守'] : null);
function iconImg(cat, cls) {
  const d = iconFor(cat);
  return d ? `<img class="${cls}" src="${d}" alt="">` : '';
}

let state = { divisions: [], seasons: [], rules: [], events: [], selectedSeasonId: null };
const esc = s => String(s ?? '').replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
function showErr(msg) { const b=$('errBox'); b.className='msg ngmsg'; b.textContent=msg; }

async function loadAll() {
  const [dv, ss, rl, ev] = await Promise.all([
    sb.from('l1_divisions').select('*').order('display_order'),
    sb.from('l1_seasons').select('*').order('starts_on'),
    sb.from('l1_rules').select('*').order('display_order'),
    sb.from('l1_events').select(EVENT_COLS).order('occurred_on', { ascending:false }).limit(2000),
  ]);
  for (const r of [dv, ss, rl, ev]) if (r.error) throw r.error;
  state.divisions=dv.data; state.seasons=ss.data; state.rules=rl.data; state.events=ev.data;
  const active = state.seasons.find(s => s.is_active) || seasonForDate(state.seasons, todayISO());
  state.selectedSeasonId = active ? active.id : (state.seasons.at(-1)?.id ?? null);
}

function renderSeasonSelect() {
  $('seasonSel').innerHTML = state.seasons.map(s =>
    `<option value="${s.id}" ${s.id === state.selectedSeasonId ? 'selected' : ''}>${esc(s.name)}${s.is_active ? '（開催中）' : ''}</option>`).join('');
}

/** 案3: 3D深度 逆ピラミッド + ミニ基準線ゲージ（左端0・中央1,000）＋ 1つ上の順位との差 */
function renderPyramid(container, rows, baseline) {
  const total = rows.length;
  const gaps = rankGaps(rows);
  const lead = leadOverSecond(rows);
  container.innerHTML = '<div id="podium"></div>';
  const podium = container.querySelector('#podium');
  rows.forEach((r, i) => {
    const isChamp = i === 0;
    const isLast = i === total - 1 && total > 1;
    const width = pyramidWidth(r.rank, total);
    const bar = pointsBar({ points:r.points, baseline });
    const gap = gaps[i];
    // サブ表示（1つ上との差）
    let subText;
    if (isChamp) {
      subText = lead == null ? '🏆 首位' : `🏆 首位（2位に <span class="gappos">+${lead.toLocaleString()}L</span>）`;
    } else {
      const g = gap ?? 0;
      subText = `1つ上との差 <span class="${g < 0 ? 'gapneg' : 'gappos'}">${g > 0 ? '+' : ''}${g.toLocaleString()}L</span>`;
    }
    // メダリオン（1〜3位は金銀銅、以降は青、最下位は危険色）
    const mcls = i === 0 ? 'm-gold' : i === 1 ? 'm-silver' : i === 2 ? 'm-bronze' : (isLast ? 'm-danger' : 'm-blue');
    const badge = isChamp ? '👑' : (isLast ? '☠' : r.rank);
    const fillCls = isChamp ? 'champ' : (bar.side === 'down' ? 'down' : 'up');
    const el = document.createElement('div');
    el.className = 'prow' + (isChamp ? ' champ' : '') + (isLast ? ' last' : '');
    el.style.width = width + '%';
    el.innerHTML = `
      ${isChamp ? `<img class="c-tro" src="${TROPHY}" alt="">` : ''}
      <div class="medallion ${mcls}">${badge}</div>
      <div><div class="nm">${esc(r.name)}${isChamp ? '<span class="champ-tag">王者</span>' : ''}${isLast ? '<span class="last-tag">最下位</span>' : ''}</div>
        <span class="sub">${subText}</span>
        <div class="mini"><div class="f ${fillCls}" style="width:${bar.fillPct}%"></div><div class="c" style="left:${bar.centerPct}%"></div><span class="z">0</span><span class="k" style="left:${bar.centerPct}%">1,000</span></div>
      </div>
      <div class="val"><div class="pt">${r.points.toLocaleString()}<span style="font-size:12px"> L</span></div></div>`;
    podium.appendChild(el);
  });
  if (total > 1) {
    const note = document.createElement('div');
    note.className = 'last-note';
    note.textContent = '☠ 最下位Divisionは次回イベントの企画・幹事、掃除1カ月などを担当 ☠';
    container.appendChild(note);
  }
}

function renderStandings() {
  const season = state.seasons.find(s => s.id === state.selectedSeasonId);
  if (!season) { $('standingsBody').innerHTML = '<div class="card muted">シーズンがありません</div>'; return; }
  const eventsBySeason = new Map(state.seasons.map(s => [s.id, state.events.filter(e => e.season_id === s.id)]));
  const rows = calcStandingsCarry({ season, seasons:state.seasons, divisions:state.divisions.filter(d=>d.is_active!==false), eventsBySeason });
  const baseline = seasonBaseline({ season, seasons:state.seasons });
  const blackout = isBlackout(season, todayISO());
  const carried = !!season.carryover_from;
  $('standingsTitle').textContent = `${season.name}${carried ? '（持ち越し）' : ''}`;

  if (blackout) {
    $('standingsBody').innerHTML = `
      <div class="card blackout">
        <div class="big">🤫 順位は決起会で発表！</div>
        <p>結果発表月のため、順位と現在ポイントは非公開です。</p>
        <p>ポイントの増減は下のフィードで確認できます。</p>
      </div>`;
  } else {
    renderPyramid($('standingsBody'), rows, baseline);
  }

  const seasonEvents = state.events.filter(e => e.season_id === season.id);
  const feed = buildFeed({ events:seasonEvents, divisions:state.divisions, rules:state.rules, limit:60 });
  $('feedBody').innerHTML = feed.length === 0
    ? '<div class="muted" style="padding:12px 0">まだ記録がありません。</div>'
    : feed.map(f => `
      <div class="feeditem">
        <div class="left">${iconImg(f.category,'fi')}<span><span class="date">${esc(f.occurred_on)}</span><b>${esc(f.division_name)}</b>　${esc(f.category)}<span class="muted">（${esc(f.label)}）</span></span></div>
        <div class="${f.kind === 'add' ? 'add' : 'deduct'}">${esc(f.points_label)} L</div>
      </div>`).join('');
}

function renderAnnual() {
  const active = state.seasons.find(s => s.is_active);
  const season = active || state.seasons.find(s => s.id === state.selectedSeasonId) || state.seasons.at(-1);
  const cycle = season?.cycle;
  if (!cycle) { $('annualBody').innerHTML = '<div class="card muted">データがありません</div>'; return; }
  $('annualTitle').textContent = `年間集計 ${annualTermLabel(season.name)}`;
  if (isAnnualBlackout({ cycle, seasons:state.seasons }, todayISO())) {
    $('annualBody').innerHTML = `
      <div class="card blackout">
        <div class="big">🤫 年間王者は決起会で発表！</div>
        <p>結果発表月のため、年間集計は非公開です。</p>
      </div>`;
    return;
  }
  const eventsBySeason = new Map(state.seasons.map(s => [s.id, state.events.filter(e => e.season_id === s.id)]));
  const rows = calcAnnualStandings({ cycle, seasons:state.seasons, divisions:state.divisions.filter(d=>d.is_active!==false), eventsBySeason });
  const baseline = seasonBaseline({ season, seasons:state.seasons });
  renderPyramid($('annualBody'), rows, baseline);
}

function renderCriteria() {
  const g = groupRules(state.rules);
  const row = r => `
    <div class="critrow">
      ${iconImg(r.category,'ci') || '<span class="ci"></span>'}
      <div><div class="clabel">${esc(r.category)}</div><div class="cdesc">${esc(r.label)}</div></div>
      <div class="cpt ${r.kind}">${r.is_variable ? '±XXX L' : `${formatPoints(r.points)} L`}</div>
    </div>`;
  $('criteriaBody').innerHTML = `
    <div class="crittbl deduct">
      <div class="crithead">🚩 減点項目</div>
      ${g.deduct.map(row).join('')}
    </div>
    <div class="crittbl add">
      <div class="crithead">⭐ 加点項目</div>
      ${g.add.map(row).join('')}
    </div>`;
}

function renderApplyForm() {
  $('apDivision').innerHTML = '<option value="">選択してください</option>' +
    state.divisions.filter(d => d.is_active !== false).map(d => `<option value="${d.id}">${esc(d.name)}</option>`).join('');
  const g = groupRules(state.rules);
  const opt = r => `<option value="${r.id}">${esc(r.category)}｜${esc(r.label)}${r.is_variable ? '（pt都度設定）' : `（${formatPoints(r.points)}L）`}</option>`;
  $('apRule').innerHTML = '<option value="">選択してください</option>' +
    `<optgroup label="加点">${g.add.map(opt).join('')}</optgroup>` +
    `<optgroup label="減点">${g.deduct.map(opt).join('')}</optgroup>`;
  $('apDate').value = todayISO();
}
function currentRule() { return state.rules.find(r => r.id === $('apRule').value) || null; }
function updateApPreview() {
  const r = currentRule();
  $('apPointsWrap').classList.toggle('hidden', !r?.is_variable);
  const pv = $('apPreview');
  if (!r) { pv.classList.add('hidden'); return; }
  pv.classList.remove('hidden');
  pv.innerHTML = `<div class="critrow" style="border:1px solid var(--line-soft);border-radius:10px">
    ${iconImg(r.category,'ci') || '<span class="ci"></span>'}
    <div><div class="clabel">${esc(r.category)}</div><div class="cdesc">${esc(r.label)}</div></div>
    <div class="cpt ${r.kind}">${r.is_variable ? '±XXX L' : `${formatPoints(r.points)} L`}</div></div>`;
}

async function submitRequest() {
  const rule = currentRule();
  const input = { division_id:$('apDivision').value, requester_name:$('apName').value, occurred_on:$('apDate').value, note:$('apNote').value, points:$('apPoints').value };
  const v = validateRequestInput(input, rule);
  const msg = $('apMsg');
  if (!v.ok) { msg.className='msg ngmsg'; msg.textContent=v.errors.join('\n'); return; }
  $('apSubmit').disabled = true;
  const payload = { division_id:input.division_id, rule_id:rule.id, occurred_on:input.occurred_on, requester_name:input.requester_name.trim(), note:input.note || null };
  if (rule.is_variable) payload.points = v.points;
  const { error } = await sb.from('l1_requests').insert(payload);
  $('apSubmit').disabled = false;
  if (error) { msg.className='msg ngmsg'; msg.textContent='申請に失敗しました: ' + error.message; return; }
  msg.className='msg okmsg'; msg.textContent='申請を受け付けました。運営の承認後にダッシュボードへ反映されます。';
  $('apNote').value=''; $('apPoints').value='';
}

// ---------- 申請の認証・権限ゲート ----------
function applyView(mode) { // 'login' | 'denied' | 'form'
  $('applyLogin').classList.toggle('hidden', mode !== 'login');
  $('applyDenied').classList.toggle('hidden', mode !== 'denied');
  $('applyForm').classList.toggle('hidden', mode !== 'form');
}
async function refreshApplyGate() {
  const { data: { session } } = await sb.auth.getSession();
  if (!session) { applyView('login'); return; }
  let can = false;
  try { const { data } = await sb.rpc('l1_can_apply'); can = !!data; } catch { can = false; }
  const email = session.user?.email ?? '';
  if (can) {
    $('whoami').textContent = email;
    $('apName').value = $('apName').value || (email.split('@')[0] ?? '');
    applyView('form');
  } else {
    $('deniedEmail').textContent = email;
    applyView('denied');
  }
}
async function applyLogin() {
  const msg = $('lgMsg');
  const email = $('lgEmail').value.trim(), pass = $('lgPass').value;
  if (!email || !pass) { msg.className='msg ngmsg'; msg.textContent='メールとパスワードを入力してください'; return; }
  $('lgBtn').disabled = true;
  const { error } = await sb.auth.signInWithPassword({ email, password: pass });
  $('lgBtn').disabled = false;
  if (error) { msg.className='msg ngmsg'; msg.textContent='ログインに失敗しました: ' + error.message; return; }
  $('lgMsg').className='msg'; $('lgPass').value='';
  await refreshApplyGate();
}
async function applyLogout() { await sb.auth.signOut(); applyView('login'); }

function switchTab(tab) {
  const map = [['tabSeason','secSeason'],['tabAnnual','secAnnual'],['tabCriteria','secCriteria'],['tabApply','secApply']];
  for (const [btn, sec] of map) { $(btn).classList.toggle('active', btn === tab); $(sec).classList.toggle('hidden', btn !== tab); }
  if (tab === 'tabAnnual') renderAnnual();
  if (tab === 'tabCriteria') renderCriteria();
  if (tab === 'tabApply') refreshApplyGate();
}

async function init() {
  $('trophyImg').src = TROPHY;
  try {
    await loadAll();
    $('loading').classList.add('hidden');
    renderSeasonSelect(); renderStandings(); renderApplyForm();
    $('secSeason').classList.remove('hidden');
    $('seasonSel').addEventListener('change', e => { state.selectedSeasonId = e.target.value; renderStandings(); });
    $('tabSeason').addEventListener('click', () => switchTab('tabSeason'));
    $('tabAnnual').addEventListener('click', () => switchTab('tabAnnual'));
    $('tabCriteria').addEventListener('click', () => switchTab('tabCriteria'));
    $('tabApply').addEventListener('click', () => switchTab('tabApply'));
    $('apRule').addEventListener('change', updateApPreview);
    $('apSubmit').addEventListener('click', submitRequest);
    $('lgBtn').addEventListener('click', applyLogin);
    $('lgPass').addEventListener('keydown', e => { if (e.key === 'Enter') applyLogin(); });
    $('denyLogout').addEventListener('click', applyLogout);
    $('logoutLink').addEventListener('click', e => { e.preventDefault(); applyLogout(); });
  } catch (e) {
    $('loading').classList.add('hidden');
    showErr('データの取得に失敗しました。config.jsのanonキー設定とスキーマ適用を確認してください。\n' + (e?.message ?? e));
  }
}
init();
</script>
</body>
</html>
